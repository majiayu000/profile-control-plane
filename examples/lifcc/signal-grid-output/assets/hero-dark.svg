<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="lifcc signal grid" data-mode="dark">
      <defs>
    <linearGradient id="industrial-bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07131A"/><stop offset="1" stop-color="#10141F"/></linearGradient>
    <linearGradient id="industrial-accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#00A7D1"/><stop offset="1" stop-color="#E84A8A"/></linearGradient>
    <pattern id="industrial-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#17313C" stroke-width="1"/></pattern>
    <pattern id="industrial-dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#17313C"/></pattern>
    <filter id="industrial-glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs><style>
    text{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
    .micro{font-size:9px;letter-spacing:2px}.label{font-size:11px;letter-spacing:2.5px;font-weight:700}
    .flow{stroke-dasharray:6 9;animation:flow 7s linear infinite}.pulse{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-in-out infinite}
    .scan{animation:scan 5s ease-in-out infinite}.flicker{animation:flicker 2.2s ease-in-out infinite}.boot{animation:boot .8s cubic-bezier(.2,.8,.2,1) both}
    @keyframes flow{to{stroke-dashoffset:-150}}@keyframes pulse{50%{opacity:.35;transform:scale(.72)}}
    @keyframes scan{50%{opacity:.28;transform:translateX(24px)}}@keyframes flicker{50%{opacity:.38}}@keyframes boot{from{opacity:0}to{opacity:1}}
    @media(prefers-reduced-motion:reduce){.flow,.pulse,.scan,.flicker,.boot{animation:none}}
  </style><rect width="1200" height="360" rx="18" fill="url(#industrial-bg)"/><rect width="1200" height="360" rx="18" fill="url(#industrial-grid)" opacity=".68"/><rect x="680" y="44" width="500" height="246" fill="url(#industrial-dots)" opacity=".76"/>
