        <text x="334" y="117" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#699078">02 / EXTEND</text><text x="500" y="117" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">claude-skill-registry</text>
        <text x="334" y="134" class="field-label" font-size="8.5" fill="#A7AFA4">Discovery and distribution for agent skills</text><path d="M334 142H708" stroke="#47574E"/>
      </g><g class="field-rise" style="animation-delay:84ms">
        <path d="M290 185C301 185 299 167 312 167" fill="none" stroke="#699078"/><g transform="translate(317 167) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="334" y="164" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#699078">03 / TRUST</text><text x="500" y="164" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">vibeguard</text>
        <text x="334" y="181" class="field-label" font-size="8.5" fill="#A7AFA4">Rules and guards against unverified changes</text><path d="M334 189H708" stroke="#47574E"/>
      </g><g class="field-rise" style="animation-delay:126ms">
        <path d="M290 232C301 232 299 214 312 214" fill="none" stroke="#699078"/><g transform="translate(317 214) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="334" y="211" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#699078">04 / REMEMBER</text><text x="500" y="211" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">remem</text>
        <text x="334" y="228" class="field-label" font-size="8.5" fill="#A7AFA4">Local-first auditable agent memory</text><path d="M334 236H708" stroke="#47574E"/>
      </g><g class="field-rise" style="animation-delay:168ms">
        <path d="M290 279C301 279 299 261 312 261" fill="none" stroke="#C56350"/><g transform="translate(317 261) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="334" y="258" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#C56350">05 / ORCHESTRATE</text><text x="500" y="258" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">harness</text>
        <text x="334" y="275" class="field-label" font-size="8.5" fill="#A7AFA4">Governed fleets of parallel coding agents</text><path d="M334 283H708" stroke="#47574E"/>
