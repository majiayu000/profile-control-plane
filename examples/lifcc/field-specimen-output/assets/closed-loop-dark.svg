        <path d="M728 91C739 91 737 73 750 73" fill="none" stroke="#C56350"/><g transform="translate(755 73) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="772" y="70" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#C56350">06 / ROUTE</text><text x="938" y="70" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">litellm-rs</text>
        <text x="772" y="87" class="field-label" font-size="8.5" fill="#A7AFA4">One high-performance gateway for 100+ LLM APIs</text><path d="M772 95H1146" stroke="#47574E"/>
      </g><g class="field-rise" style="animation-delay:252ms">
        <path d="M728 138C739 138 737 120 750 120" fill="none" stroke="#C56350"/><g transform="translate(755 120) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="772" y="117" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#C56350">07 / GOVERN</text><text x="938" y="117" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">specrail</text>
        <text x="772" y="134" class="field-label" font-size="8.5" fill="#A7AFA4">Spec-first repository workflow rails</text><path d="M772 142H1146" stroke="#47574E"/>
      </g><g class="field-rise" style="animation-delay:294ms">
        <path d="M728 185C739 185 737 167 750 167" fill="none" stroke="#C56350"/><g transform="translate(755 167) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="772" y="164" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#C56350">08 / KEEP</text><text x="938" y="164" class="field-serif" font-size="11" font-style="italic" fill="#E8E8DA">keepline</text>
        <text x="772" y="181" class="field-label" font-size="8.5" fill="#A7AFA4">Monitor and recover long-running agent work</text><path d="M772 189H1146" stroke="#47574E"/>
