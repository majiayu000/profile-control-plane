        <text x="334" y="228" class="field-label" font-size="8.5" fill="#68736B">Local-first auditable agent memory</text><path d="M334 236H708" stroke="#AAB2A8"/>
      </g><g class="field-rise" style="animation-delay:168ms">
        <path d="M290 279C301 279 299 261 312 261" fill="none" stroke="#A74838"/><g transform="translate(317 261) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="334" y="258" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#A74838">05 / ORCHESTRATE</text><text x="500" y="258" class="field-serif" font-size="11" font-style="italic" fill="#24332C">harness</text>
        <text x="334" y="275" class="field-label" font-size="8.5" fill="#68736B">Governed fleets of parallel coding agents</text><path d="M334 283H708" stroke="#AAB2A8"/>
