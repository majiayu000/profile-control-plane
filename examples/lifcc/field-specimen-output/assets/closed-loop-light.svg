        <path d="M728 138C739 138 737 120 750 120" fill="none" stroke="#A74838"/><g transform="translate(755 120) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="772" y="117" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#A74838">07 / GOVERN</text><text x="938" y="117" class="field-serif" font-size="11" font-style="italic" fill="#24332C">specrail</text>
        <text x="772" y="134" class="field-label" font-size="8.5" fill="#68736B">Spec-first repository workflow rails</text><path d="M772 142H1146" stroke="#AAB2A8"/>
      </g><g class="field-rise" style="animation-delay:294ms">
        <path d="M728 185C739 185 737 167 750 167" fill="none" stroke="#A74838"/><g transform="translate(755 167) scale(.72)"><use class="field-pin" href="#field-specimen-pin"/></g>
        <text x="772" y="164" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#A74838">08 / KEEP</text><text x="938" y="164" class="field-serif" font-size="11" font-style="italic" fill="#24332C">keepline</text>
        <text x="772" y="181" class="field-label" font-size="8.5" fill="#68736B">Monitor and recover long-running agent work</text><path d="M772 189H1146" stroke="#AAB2A8"/>
