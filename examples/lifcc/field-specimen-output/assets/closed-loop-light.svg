        <text x="334" y="164" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#315D49">03 / TRUST</text><text x="500" y="164" class="field-serif" font-size="11" font-style="italic" fill="#24332C">vibeguard</text>
        <text x="334" y="181" class="field-label" font-size="8.5" fill="#68736B">Rules and guards against unverified changes</text><path d="M334 189H708" stroke="#AAB2A8"/>
      </g><g class="field-rise" style="animation-delay:126ms">
