      <text x="184" y="190" text-anchor="middle" class="field-serif" font-size="58" font-weight="700" fill="#24332C">08</text><text x="184" y="216" text-anchor="middle" class="field-mono" font-size="8" letter-spacing="1.8" fill="#A74838">TAXA OBSERVED</text><text x="50" y="280" class="field-label" font-size="9" fill="#68736B">LIFCC</text>
      <text x="309" y="40" class="field-serif" font-size="17" font-style="italic" fill="#24332C">LAYER TAXONOMY / CLASSIFICATION KEY</text><text x="1146" y="40" text-anchor="end" class="field-mono" font-size="8" letter-spacing="1.4" fill="#68736B">AI AGENT INFRASTRUCTURE</text><path d="M309 52H1146" stroke="#AAB2A8"/><path d="M727 61V303" stroke="#AAB2A8"/>
