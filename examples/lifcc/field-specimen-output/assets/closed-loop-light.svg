        <text x="772" y="70" class="field-mono" font-size="7.5" letter-spacing="1.3" fill="#A74838">06 / ROUTE</text><text x="938" y="70" class="field-serif" font-size="11" font-style="italic" fill="#24332C">litellm-rs</text>
        <text x="772" y="87" class="field-label" font-size="8.5" fill="#68736B">One high-performance gateway for 100+ LLM APIs</text><path d="M772 95H1146" stroke="#AAB2A8"/>
