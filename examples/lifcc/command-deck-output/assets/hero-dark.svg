      <g transform="translate(1083 310)"><circle r="29" fill="#0C1C24" stroke="#2B4A57"/><circle r="20" fill="none" stroke="url(#industrial-accent)" stroke-dasharray="5 5"/><path d="M0-16V16M-16 0H16" stroke="#00A7D1"/><circle class="pulse" r="4" fill="#E84A8A"/></g><text x="760" y="322" class="micro" fill="#8BA9B5">CONTROL BUS / ONLINE</text>
      <rect x="1" y="1" width="1198" height="358" rx="18" fill="none" stroke="#00A7D1" stroke-opacity=".72"/></svg>