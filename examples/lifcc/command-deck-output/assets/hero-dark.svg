        <circle class="pulse" cx="1129" cy="163" r="3" fill="#00A7D1"/></g><g class="boot" style="animation-delay:0.36s"><path d="M760 220H1148V275H780L760 255Z" fill="#0C1C24" fill-opacity=".88" stroke="#E84A8A" stroke-opacity=".72"/>
        <text x="778" y="240" font-size="8" font-weight="700" letter-spacing="1.5" fill="#E84A8A">03 / ROUTE</text>
        <text x="778" y="259" font-size="13" font-weight="800" fill="#E7F7FC">litellm-rs</text><text x="1131" y="259" text-anchor="end" font-size="8" fill="#8BA9B5">CHANNEL 03</text>
