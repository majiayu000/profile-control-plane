      <g transform="translate(1046 22)"><circle class="flicker" r="4" fill="#00A7D1" filter="url(#industrial-glow)"/><text x="14" y="4" class="micro" fill="#8BA9B5">MISSION READY</text></g><path d="M0 44H1200" stroke="#2B4A57"/>
      <g class="boot"><text x="38" y="82" class="label" fill="#00A7D1">// OPERATOR IDENTITY / SYSTEM COMMAND</text><text x="38" y="139" font-size="43" font-weight="900" letter-spacing="-1.6" fill="#E7F7FC">AI AGENT</text><text x="38" y="182" font-size="43" font-weight="900" letter-spacing="-1.6" fill="#E7F7FC">INFRASTRUCTURE</text>
