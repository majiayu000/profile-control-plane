<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-label="lifcc cable routing" data-mode="light">
      <defs>
    <pattern id="patch-grid" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#AFB5AC" fill-opacity=".35"/></pattern>
    <g id="patch-jack"><circle r="7.5" fill="none" stroke="#41586F" stroke-width="2"/><circle r="3.1" fill="#C7CBC8"/></g>
  </defs><style>
    .patch-label{font-family:Avenir Next Condensed,Arial Narrow,sans-serif}.patch-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
